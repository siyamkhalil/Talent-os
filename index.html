<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalentOS // Next-Gen ATS Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar Navigation -->
      <aside class="sidebar">
        <div class="logo-section">
          <span class="logo-icon">✦</span>
          <h2>TalentOS</h2>
        </div>
        <nav class="nav-menu">
          <a href="#" class="nav-item active">Dashboard</a>
          <a href="#" class="nav-item">Applicants</a>
          <a href="#" class="nav-item">Jobs</a>
          <a href="#" class="nav-item">Settings</a>
        </nav>
      </aside>

      <!-- Main Content Area -->
      <main class="main-content">
        <header class="top-header">
          <div>
            <h1>Hiring Workspace</h1>
            <p class="subtitle">
              Evaluate candidates and analyze ATS scores in real-time.
            </p>
          </div>
          <div class="stats-badge">Active Openings: <strong>12</strong></div>
        </header>

        <!-- Responsive Dashboard Grid -->
        <div class="dashboard-grid">
          <!-- Left: Form Card -->
          <section class="card action-panel">
            <h2>Add & Parse Candidate</h2>
            <form id="candidateForm">
              <div class="form-group">
                <label for="fullName">Full Name</label>
                <input
                  type="text"
                  id="fullName"
                  placeholder="e.g., Jane Doe"
                  required
                />
              </div>
              <div class="form-group">
                <label for="jobRole">Target Role</label>
                <select id="jobRole">
                  <option value="Frontend Developer">Frontend Developer</option>
                  <option value="UI/UX Designer">UI/UX Designer</option>
                  <option value="Product Manager">Product Manager</option>
                </select>
              </div>
              <div class="form-group">
                <label for="resumePaste"
                  >Paste Resume Text (For Keywords Match)</label
                >
                <textarea
                  id="resumePaste"
                  placeholder="Paste skills or experience here... (e.g., JavaScript, React, Figma, Wireframe, Agile)"
                  required
                ></textarea>
              </div>
              <button type="submit" class="btn-primary">
                Analyze & Process
              </button>
            </form>
          </section>

          <!-- Right: Table Pipeline Card -->
          <section class="card pipeline-panel">
            <div class="pipeline-header">
              <h2>Applicant Pipeline</h2>
              <input
                type="text"
                id="searchBar"
                placeholder="🔍 Search candidate..."
              />
            </div>

            <!-- Scrollable Responsive Wrapper -->
            <div class="table-responsive">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Candidate</th>
                    <th>Role</th>
                    <th>ATS Match</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="candidateRows">
                  <!-- JS items inject here -->
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
